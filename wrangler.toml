# Summit booking portal — Cloudflare Worker + D1.
#
# You should NOT need to hand-edit this file. The easy path (docs/PORTAL.md §3)
# connects this repo to Cloudflare in the dashboard; you create the D1 database
# and paste the three secrets there — all clicks, no command line. The Worker
# creates its own tables on first run, so there's no migration step, and the
# Stripe publishable key + portal URL live in the Summit app, not here.

name = "summit-booking-portal"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]  # Stripe SDK needs Node built-ins on Workers

# The D1 binding. NOTE: `database_id` below is a public IDENTIFIER, not a secret —
# it's the database's "address". It grants no access on its own (reaching the data
# needs your Cloudflare login or an API token), so committing it is safe and normal.
# The real secrets (Stripe keys, the app key) never live in this repo — they go in
# Cloudflare's encrypted secret store. Create the DB `summit-bookings`, then paste
# its Database ID below (or on GitHub's web editor).
[[d1_databases]]
binding = "DB"
database_name = "summit-bookings"
database_id = "SET_IN_DASHBOARD_OR_PASTE_HERE"

[triggers]
# Hourly sweep: expire past-due links (releases the desktop's soft-hold on next
# poll) and purge terminal bookings the desktop has already acked.
crons = ["17 * * * *"]

# Secrets (set in the dashboard, or via `npx wrangler secret put …` — see
# docs/PORTAL.md §3): STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, DESKTOP_API_KEY.
